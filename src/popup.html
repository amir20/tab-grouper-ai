<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Grouper AI</title>
  <style>
    :root {
      --bg: #16161a;
      --surface: #1e1e24;
      --surface-hover: #25252d;
      --border: #2e2e38;
      --text: #ececf0;
      --text-secondary: #a0a0b0;
      --muted: #6c6c80;
      --accent: #7b6cf6;
      --accent-hover: #8d80ff;
      --accent-subtle: rgba(123, 108, 246, 0.1);
      --success: #3dd68c;
      --warn: #f0c040;
      --danger: #ef5f5f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #fff;
    }

    .title {
      font-size: 14px;
      font-weight: 650;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .model-badge {
      font-size: 10px;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      min-height: 38px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--muted);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.loading {
      background: var(--warn);
      box-shadow: 0 0 0 3px rgba(240, 192, 64, 0.2);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .status-dot.ready {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(61, 214, 140, 0.15);
    }
    .status-dot.error {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(239, 95, 95, 0.2);
    }
    .status-dot.working {
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(123, 108, 246, 0.2);
      animation: pulse 0.9s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    .status-text {
      color: var(--text-secondary);
      font-size: 12px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      padding: 0 16px 10px;
      display: none;
    }

    .progress-wrap.visible { display: block; }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-label {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    /* ── Tab count ── */
    .tab-count {
      padding: 10px 16px;
      color: var(--text-secondary);
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }

    .tab-count span {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Main action ── */
    .action-area {
      padding: 14px 16px;
    }

    .btn-group {
      width: 100%;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    .btn-group:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 2px 12px rgba(123, 108, 246, 0.25);
    }
    .btn-group:active:not(:disabled) {
      transform: scale(0.98);
    }
    .btn-group:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Results ── */
    .results {
      border-top: 1px solid var(--border);
      display: none;
    }

    .results.visible { display: block; }

    .results-header {
      padding: 10px 16px 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .group-list {
      padding: 0 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .group-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--surface);
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: background 0.12s;
    }

    .group-item:hover {
      background: var(--surface-hover);
    }

    .group-color {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .group-name {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-count {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Error ── */
    .error-box {
      margin: 0 16px 12px;
      padding: 10px 12px;
      background: rgba(239, 95, 95, 0.08);
      border: 1px solid rgba(239, 95, 95, 0.18);
      border-radius: 6px;
      color: var(--danger);
      font-size: 11px;
      display: none;
      white-space: pre-wrap;
      max-height: 150px;
      overflow-y: auto;
    }

    .error-box.visible { display: block; }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-link {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.12s;
    }

    .footer-link:hover {
      color: var(--text-secondary);
    }

    /* ── Chrome tab group colors ── */
    .color-grey   { background: #8e8e93; }
    .color-blue   { background: #5a9cf5; }
    .color-red    { background: #ef6b6b; }
    .color-yellow { background: #f5c142; }
    .color-green  { background: #4ec98b; }
    .color-pink   { background: #f06ca4; }
    .color-purple { background: #a478e8; }
    .color-cyan   { background: #3cbfbf; }
    .color-orange { background: #f0923e; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo">&#x2B21;</div>
      <span class="title">Tab Grouper AI</span>
    </div>
    <span class="model-badge" id="modelBadge">phi-3.5</span>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Initializing...</span>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">Downloading model...</div>
  </div>

  <div class="tab-count" id="tabCount">
    Loading tabs...
  </div>

  <div class="action-area">
    <button class="btn-group" id="btnGroup" disabled>
      Group Tabs
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="results" id="results">
    <div class="results-header">Groups Applied</div>
    <div class="group-list" id="groupList"></div>
  </div>

  <div class="footer">
    <span class="footer-link" id="clearBtn">Clear groups</span>
    <span class="footer-link" id="settingsBtn">Model</span>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
